<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit site</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Edit your site</h1>
        <p>Change the headline, description, and color.</p>
      </header>
      <form id="edit-form" class="card">
        <label>
          Title
          <input name="title" type="text" required />
        </label>
        <label>
          Description
          <textarea name="body" rows="4"></textarea>
        </label>
        <label>
          Theme color
          <input name="color" type="text" placeholder="#3b82f6" />
        </label>
        <button type="submit">Save changes</button>
        <p id="form-error" class="error" role="alert"></p>
      </form>
      <div class="actions">
        <a id="back-link" class="button secondary" href="#">Back</a>
      </div>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
