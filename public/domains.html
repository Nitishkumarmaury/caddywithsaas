<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connect domain</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Connect a custom domain</h1>
        <p>We support www subdomains and TXT verification for this demo.</p>
      </header>
      <form id="domain-form" class="card">
        <label>
          Domain hostname
          <input name="hostname" type="text" placeholder="www.clientdomain.com" required />
        </label>
        <button type="submit">Add domain</button>
        <p id="form-error" class="error" role="alert"></p>
      </form>
      <section class="card">
        <h2>DNS setup</h2>
        <ol id="dns-steps"></ol>
      </section>
      <section class="card">
        <h2>Domains</h2>
        <ul id="domain-list" class="list"></ul>
      </section>
      <div class="actions">
        <a id="back-link" class="button secondary" href="#">Back</a>
      </div>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
