<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site ready</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Site created</h1>
        <p>Your site is live. Next, customize it or add a custom domain.</p>
      </header>
      <section class="card">
        <div class="row">
          <span class="label">Subdomain</span>
          <a id="subdomain" href="#">Loading...</a>
        </div>
        <div class="actions">
          <a id="edit-link" class="button" href="#">Edit site</a>
          <a id="domain-link" class="button secondary" href="#">Connect domain</a>
        </div>
      </section>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
